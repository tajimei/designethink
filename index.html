<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip planner ✈️</title>
    <link rel="stylesheet" href="style.css">
    <!-- 南国風フォント -->
    <link href="https://fonts.googleapis.com/css2?family=Rounded+Mplus+1c:wght@500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="site-note">
        ※ このサイトはお茶の水女子大学共創工学部「デザイン思考とロジックモデル」講義の一環で作成されています（チームD）
    <div class="dot-bg"></div>

    <div class="main-container">
        <header class="main-header">
            <h1>Trip planner ✈️</h1>
        </header>
        <div class="name-area">
            <label for="trip-name" class="name-label">旅行の名前</label>
            <input type="text" id="trip-name" class="trip-name-input" placeholder="例：沖縄女子旅🌺" maxlength="30">
        </div>
        <div class="content-wrapper">
            <div class="left-column">
                <div class="schedule-area">
                    <div class="label date-label">日程</div>
                    <div class="calendar-select">
                        <label>
                            出発日
                            <input type="date" id="start-date">
                        </label>
                        <label>
                            帰着日
                            <input type="date" id="end-date">
                        </label>
                    </div>
                </div>

                <div class="memo-area hotel-area">
                    <div class="label green-label">宿泊先</div>
                    <div class="add-hotel-form">
                        <input type="text" id="hotel-name" placeholder="ホテル名を入力" />
                        <input type="url" id="hotel-map" placeholder="Google MapのURL" />
                        <button id="add-hotel-btn">＋追加</button>
                    </div>
                <div id="hotel-list" class="sticky-notes"></div>
            </div>
                <div class="memo-area places-area">
                    <div class="label yellow-label">気になる場所</div>
                    <div class="add-place-form">
                        <input type="text" id="place-input" placeholder="場所名を入力" />
                        <input type="url" id="place-map" placeholder="Google MapのURL" />
                        <button id="add-place-btn">＋追加</button>
                    </div>
                    <div id="place-list" class="sticky-notes"></div>
                </div>
            </div>

            <div class="right-column">
                <div class="budget-area">
                    <div class="label purple-label">予算</div>
                    <div class="budget-content purple-box">
                        <h3>予算シミュレーター</h3>
                        <div class="form-group">
                            <label>交通費 (往復/円)</label>
                            <input type="number" id="transport" placeholder="0">
                        </div>
                        <div class="form-group">
                            <label>宿泊費 (1泊/円)</label>
                            <input type="number" id="hotel" placeholder="0">
                        </div>
                        <div class="form-group">
                            <label>宿泊数 (泊)</label>
                            <input type="number" id="nights" placeholder="0">
                        </div>
                        <div class="form-group">
                            <label>食費・その他 (1日/円)</label>
                            <input type="number" id="daily" placeholder="0">
                        </div>
                        <button id="calculate-btn">合計を計算</button>
                        <div class="result-area">
                            <p>合計予算: <span id="total-price">0</span> 円</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
